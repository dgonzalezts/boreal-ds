<!doctype html>
<html dir="ltr" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=5.0" />
    <title>Stencil Component Starter</title>
    <link rel="stylesheet" href="/build/boreal-web-components.css" />

    <script type="module" src="/build/boreal-web-components.esm.js"></script>
    <script nomodule src="/build/boreal-web-components.js"></script>

    <style>
      .center {
        width: 100%;
        display: flex;
        justify-content: space-evenly;
        align-items: center;
        height: 100vh;
      }
    </style>
  </head>
  <body>
    <my-component first="Stencil" middle="'Don't call me a framework'" last="JS"></my-component>
    <div class="center">
      <bds-tooltip id="bottom">
        Text, Icon or Label
        <div slot="tooltip-content">
          Tooltip Content
        </div>
      </bds-tooltip>
      <bds-tooltip id="top">
        Text, Icon or Label
        <div slot="tooltip-content">
          Tooltip Content
        </div>
      </bds-tooltip>
      <bds-tooltip id="right">
        Text, Icon or Label
        <div slot="tooltip-content">
          Tooltip Content
        </div>
      </bds-tooltip>
      <bds-tooltip id="left">
        Text, Icon or Label
        <div slot="tooltip-content">
          Tooltip Content
        </div>
      </bds-tooltip>
    </div>

    <script>
      const right = document.getElementById('right');
      const bottom = document.getElementById('bottom');
      const left = document.getElementById('left');
      const ttop = document.getElementById('top');

      document.addEventListener('DOMContentLoaded', () => {
        right.floatingOptions = {
          placement: 'right',
          offset: 16
        }
        bottom.floatingOptions = {
          placement: 'bottom',
          offset: 32
        }
        ttop.floatingOptions = {
          placement: 'top',
          offset: 0
        }
        left.floatingOptions = {
          placement: 'left',
          offset: 64
        }
      });
    </script>
  </body>
</html>
