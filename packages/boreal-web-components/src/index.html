<!doctype html>
<html dir="ltr" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=5.0" />
    <!-- Design tokens: CSS custom properties, reset, fonts, typography utilities -->
    <link rel="stylesheet" href="/css/boreal.css" />
    <!-- Icon font -->
    <link rel="stylesheet" href="/build/boreal-web-components.css" />
    <!-- Web components registry -->
    <script type="module" src="/build/boreal-web-components.esm.js"></script>
    <script nomodule src="/build/boreal-web-components.js"></script>

    <style>
      .center {
        width: 100%;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
      }
    </style>
  </head>
  <body data-theme="proximus" style="background-color: rgb(208, 208, 208);">
    <!--
      Playground — add components below to test them during development.
      Run: pnpm dev:components (from the root of the monorepo) to start the development server and open this page in the browser.

      Available themes for data-theme: connect | engage | protect | proximus
    -->
    <div class="center">
      <bds-button color="default">
        Button
        <bds-popover id="popover" trigger="button" width="300">
          <p>Content</p>
          <p>Content 2adasd</p>
        </bds-popover>
      </bds-button>
      
      <bds-button color="default">
        Button hide click outside
        <bds-popover id="popover-click-outside" trigger="button" width="300" has-header has-footer show-close>
          <em slot="header-icon" class="bds-icon-email"></em>
          <div slot="header-title">
            <span>Header</span>
          </div>
          <p>Content</p>
          <p>Content 2adasd</p>
          <bds-typography slot="footer-helper" variant="helper">This is a helper text</bds-typography>
          <bds-button slot="footer-button" variant="outline" color="primary" size="small">
            Button
          </bds-button>
        </bds-popover>
      </bds-button>
      
      <bds-button color="default">
        Button popover hide Click
        <bds-popover id="popover-hide-click" trigger="button" width="300" has-header has-footer>
          <em slot="header-icon" class="bds-icon-email"></em>
          <div slot="header-title">
            <span>Header</span>
          </div>
          <p>Content</p>
          <p>Content 2adasd</p>
          <bds-typography slot="footer-helper" variant="helper">This is a helper text</bds-typography>
          <bds-button slot="footer-button" variant="outline" color="primary" size="small">
            Button
          </bds-button>
        </bds-popover>
      </bds-button>
    </div>

    <script>
      const button = document.getElementById('popover');
      button.floatingOptions = {
        placement: 'bottom-start',
        hideArrow: false,
      };
      
      const buttonClickOut = document.getElementById('popover-click-outside');
      buttonClickOut.floatingOptions = {
        placement: 'left',
        closeOnClickOutside: false,
      };
      
      const buttonHideClick = document.getElementById('popover-hide-click');
      buttonHideClick.floatingOptions = {
        placement: 'right',
        closeOnClick: true,
      };
    </script>
  </body>
</html>
