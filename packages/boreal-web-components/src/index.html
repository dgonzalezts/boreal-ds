<!doctype html>
<html dir="ltr" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=5.0" />
    <title>Stencil Component Starter</title>
    <link rel="stylesheet" href="/build/boreal-web-components.css" />

    <script type="module" src="/build/boreal-web-components.esm.js"></script>
    <script nomodule src="/build/boreal-web-components.js"></script>
  </head>
  <body>
    <my-component first="Stencil" middle="'Don't call me a framework'" last="JS"></my-component>
    <bds-typography size="xl">Display size xl</bds-typography>
    <bds-typography size="lg">Display size lg</bds-typography>
    <bds-typography size="md">Display size md</bds-typography>
    <bds-typography size="sm">Display size sm</bds-typography>

    <bds-typography variant="heading" element="h1" tooltip-text="Tooltip">Heading h1</bds-typography>
    <bds-typography variant="heading" element="h2" tooltip-text="Tooltip">Heading h2</bds-typography>
    <bds-typography variant="heading" element="h3" tooltip-text="Tooltip">Heading h3</bds-typography>
    <bds-typography variant="heading" element="h4" tooltip-text="Tooltip">Heading h4</bds-typography>
    <bds-typography variant="heading" element="h5" tooltip-text="Tooltip">Heading h5</bds-typography>
    <bds-typography variant="heading" element="h6" tooltip-text="Tooltip">Heading h6</bds-typography>

    <bds-typography variant="subheading" element="h5" tooltip-text="Tooltip">Subheading</bds-typography>

    <bds-typography variant="label" element="label" is-required tooltip-text="Tooltip">Label</bds-typography>
    <bds-typography variant="label" element="label" is-required tooltip-text="Tooltip" state="disabled"
      >Label</bds-typography
    ><br />

    <bds-typography variant="helper">Helper text</bds-typography><br />
    <bds-typography variant="helper" state="error">Helper text error</bds-typography><br />

    <bds-typography variant="link" element="a" href="#">Link text</bds-typography><br />
    <bds-typography variant="link" element="a" href="#" state="disabled">Link text disabled</bds-typography>
  </body>
</html>
