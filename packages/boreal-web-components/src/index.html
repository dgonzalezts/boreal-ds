<!doctype html>
<html dir="ltr" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=5.0" />
    <!-- Design tokens: CSS custom properties, reset, fonts, typography utilities -->
    <link rel="stylesheet" href="/css/boreal.css" />
    <!-- Icon font -->
    <link rel="stylesheet" href="/build/boreal-web-components.css" />
    <!-- Web components registry -->
    <script type="module" src="/build/boreal-web-components.esm.js"></script>
  </head>
  <body data-theme="proximus">
    <!--
      Playground — add components below to test them during development.
      Run: pnpm dev:components (from the root of the monorepo) to start the development server and open this page in the browser.

      Available themes for data-theme: connect | engage | protect | proximus
    -->
      <bds-button label="Primary button" variant="outline" color="primary" id="boreal-bds">
        Button
      </bds-button>

      <script>
        // Example of dynamically changing themes
        const themes = ['connect', 'engage', 'protect', 'proximus'];
        let currentThemeIndex = 0;

        setInterval(() => {
          currentThemeIndex = (currentThemeIndex + 1) % themes.length;
          document.body.setAttribute('data-theme', themes[currentThemeIndex]);
        }, 3000); // Change theme every 3 seconds

        var button = document.getElementById('boreal-bds');
        button.addEventListener('bdsButtonClick', function(event) {
          console.log('Button clicked!', event);
        });

      </script>
  </body>
</html>
